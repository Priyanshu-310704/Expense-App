services:
  db:
    image: postgres:16-alpine
    container_name: expense-app-postgres
    environment:
      POSTGRES_DB: expense_app
      POSTGRES_USER: expense
      POSTGRES_PASSWORD: expense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense -d expense_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: expense-app-backend
    env_file: .env
    environment:
      DATABASE_URL: postgres://expense:expense@db:5432/expense_app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: expense-app-frontend
    env_file: .env
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
